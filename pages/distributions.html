<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distribution Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/system.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/article-ui.css">
  <link rel="stylesheet" href="../styles/visualizer.css">
  <link rel="stylesheet" href="../styles/section-outline.css">
  <script src="../js/theme.js"></script>
  <script defer src="../js/distributions.js"></script>
  <script defer src="../js/favicon.js"></script>
  <script type="module" src="../js/section-outline.js"></script>
</head>

<body class="ui distributions">
  <div class="container">
    <header class="page-head">
      <div class="eyebrow">// Statistics</div>
      <h1>Distribution Visualizer</h1>
      <p class="lede">Build and compare <a class="def" href="glossary.html#probability-distribution">probability distributions</a>: <a class="def" href="glossary.html#gaussian-distribution">Normal</a>, <a class="def" href="glossary.html#uniform-distribution">Uniform</a>, <a class="def" href="glossary.html#exponential-distribution">Exponential</a>, <a class="def" href="glossary.html#laplace-distribution">Laplace</a>, <a class="def" href="glossary.html#dirac-delta">Dirac</a>, and <a class="def" href="glossary.html#mixture-model">mixtures</a>.</p>
    </header>

    <main class="article-body">
      <section class="panel">
        <h2>Visualization</h2>
        <div class="dv-plots">
          <div class="dv-plot">
            <div class="dv-plot-title">Probability density (PDF)</div>
            <div id="pdf" class="dv-plot-host"></div>
          </div>
          <div class="dv-plot">
            <div class="dv-plot-title">Cumulative (CDF)</div>
            <div id="cdf" class="dv-plot-host"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Distributions</h2>
        <div class="dv-toolbar">
          <div class="dv-field">
            <span class="dv-flabel">X range</span>
            <div class="dv-xrange">
              <input id="xMin" type="number" step="0.1" value="-5" class="dv-num" aria-label="X minimum" />
              <span class="dv-to">to</span>
              <input id="xMax" type="number" step="0.1" value="5" class="dv-num" aria-label="X maximum" />
            </div>
          </div>
          <div class="dv-toolbar-actions">
            <button id="addDist" type="button" class="btn btn-acc">+ Add distribution</button>
            <button id="resetAll" type="button" class="btn">Clear all</button>
          </div>
        </div>
        <div class="forms" id="forms"></div>
      </section>

      <section class="panel">
        <h2>Active distributions</h2>
        <div id="distributions-details"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span class="credit">Created by <a href="https://linkedin.com/in/aughdon/">Aughdon Breslin</a></span>
    </footer>
  </div>
  <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
