<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distribution Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // MathJax (kept in HTML for clarity/consistency across pages)
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/visualizer.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <link rel="stylesheet" href="../styles/section-outline.css">
  <script defer src="../js/distributions.js"></script>
  <script defer src="../js/collapsible.js"></script>
  <script defer src="../js/favicon.js"></script>
  <script type="module" src="../js/section-outline.js"></script>
</head>

<body>
  <div class="container visualizer">
    <header>
      <h1>Distribution Visualizer</h1>
      <div class="subtitle">Supports Normal, Uniform, Exponential, Laplace, Dirac, and Mixtures!</div>
      <div class="home-link"><a href="../index.html">← Home</a></div>
    </header>

    <div class="controls panel collapsible" data-open-mobile>
      <h3>Controls</h3>
      <div class="global-range">
        <div class="row">
          <label for="xMin">X Min</label>
          <input id="xMin" type="number" step="0.1" value="-5">
        </div>
        <div class="row">
          <label for="xMax">X Max</label>
          <input id="xMax" type="number" step="0.1" value="5">
        </div>
        <div>
          <button id="addDist">Add Distribution</button>
          <button id="resetAll">Clear All</button>
        </div>
      </div>

      <div class="forms" id="forms"></div>
    </div>

    <div class="graphs">
      <div class="graph-card panel collapsible" data-open-mobile id="pdfCard">
        <h3 class="graph-title">Probability Density Function (PDF)</h3>
        <div id="pdf"></div>
      </div>
      <div class="graph-card panel collapsible" data-open-mobile id="cdfCard">
        <h3 class="graph-title">Cumulative Distribution Function (CDF)</h3>
        <div id="cdf"></div>
      </div>
    </div>

    <div class="distributions-info panel collapsible">
      <h2>Active Distributions</h2>
      <div id="distributions-details"></div>
    </div>
    <footer class="footer">
        <p class="footer-tag">Created by <a href="https://linkedin.com/in/aughdon/">Aughdon Breslin</a></p>
    </footer>
  </div>
</body>

</html>
